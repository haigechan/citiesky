<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Fruit Coloring Book | Author Haige</title>
    <style>
        :root { --amazon: #FF9900; --video: #eb4d4b; --audio: #6c5ce7; --maze: #27ae60; }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; padding: 40px 20px; text-align: center; }
        .cover { width: 180px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { display: block; text-decoration: none; padding: 18px; margin: 12px auto; border-radius: 50px; font-weight: bold; width: 100%; max-width: 300px; color: white; transition: 0.3s; border: none; font-size: 16px; cursor: pointer; box-sizing: border-box; }
        .btn:active { transform: scale(0.98); }
        
        .hidden-box { display: none; margin-top: 20px; background: #f1f2f6; padding: 15px; border-radius: 15px; width: 100%; max-width: 300px; box-sizing: border-box; }
        audio { width: 100%; margin-bottom: 10px; }
        
        /* 下载按钮样式 */
        .dl-trigger {
            display: inline-block;
            background: var(--audio);
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        .status-msg { font-size: 11px; color: #666; margin-top: 8px; line-height: 1.4; }
        .answer-img { width: 100%; border-radius: 10px; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <img src="cover.jpg" class="cover" alt="My First Fruit Coloring Book">
    <h1>My First Fruit Coloring Book</h1>
    
    <a href="https://www.amazon.com/dp/B0GVYGDSNV" class="btn" style="background:var(--amazon)" target="_blank">🛒 Buy on Amazon</a>
    <a href="https://www.instagram.com/p/DWrCfjkAj_g/" class="btn" style="background:var(--video)" target="_blank">📺 Watch Trailer</a>
    
    <div class="btn" style="background:var(--audio);" onclick="document.getElementById('audio-box').style.display='block'">🎧 Listen & Download</div>
    <div class="btn" style="background:var(--maze);" onclick="document.getElementById('maze-box').style.display='block'">🧩 View Maze Answer</div>

    <div id="audio-box" class="hidden-box">
        <audio id="audioPlayer" controls src="coloringbook.mp3"></audio>
        
        <div style="border-top: 1px solid #ddd; margin-top: 10px; padding-top: 5px;">
            <button id="downloadBtn" class="dl-trigger" onclick="handleDownload('coloringbook.mp3')">
                📥 Download MP3
            </button>
            <p id="dlStatus" class="status-msg"></p>
        </div>
    </div>

    <div id="maze-box" class="hidden-box">
        <p style="margin:0; color:#2d3436; font-weight:bold;">Maze Answer:</p>
        <img src="maze-answer.jpg" class="answer-img" alt="Maze Answer">
    </div>

    <script>
        async function handleDownload(url) {
            const btn = document.getElementById('downloadBtn');
            const status = document.getElementById('dlStatus');
            
            try {
                btn.innerText = "⏳ Processing...";
                const response = await fetch(url);
                if (!response.ok) throw new Error();

                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = blobUrl;
                // 设置下载后的文件名
                link.download = "Fruit_Coloring_Book_Audio.mp3";
                document.body.appendChild(link);
                link.click();
                
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
                
                btn.innerText = "📥 Download MP3";
                status.innerText = "Download started!";
            } catch (err) {
                // 环境受限（如本地预览）时的降级提示
                btn.innerText = "📥 Manual Save";
                status.innerHTML = "<strong>Environment limited.</strong><br>Long-press the player above and select 'Save audio'.";
            }
        }
    </script>

</body>
</html>
