<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talking about Horses in the Year of the Horse | Author Sky</title>
    <style>
        :root { --amazon: #FF9900; --video: #eb4d4b; --audio: #6c5ce7; }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; padding: 40px 20px; text-align: center; }
        .cover { width: 180px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { display: block; text-decoration: none; padding: 18px; margin: 12px auto; border-radius: 50px; font-weight: bold; width: 100%; max-width: 300px; color: white; transition: 0.3s; border: none; font-size: 16px; cursor: pointer; box-sizing: border-box; }
        .btn:active { transform: scale(0.98); }
        
        #audio-box { display: none; margin-top: 20px; background: #f1f2f6; padding: 20px; border-radius: 15px; width: 100%; max-width: 300px; box-sizing: border-box; }
        audio { width: 100%; margin-bottom: 10px; }
        
        /* 下载按钮样式 */
        .dl-trigger {
            display: inline-block;
            background: var(--audio);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.2);
        }
        .status-msg { font-size: 11px; color: #666; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

    <img src="cover.jpg" class="cover" alt="Talking about Horses in the Year of the Horse">
    <h1>Talking about Horses in the Year of the Horse</h1>
    
    <a href="https://www.amazon.com/dp/B0GSKH9FJ1" class="btn" style="background:var(--amazon)" target="_blank">🛒 Buy on Amazon</a>
    <a href="https://www.instagram.com/haigechan/reel/DWV9p4igkrr/" class="btn" style="background:var(--video)" target="_blank">📺 Watch Trailer</a>
    
    <div class="btn" style="background:var(--audio);" onclick="document.getElementById('audio-box').style.display='block'">🎧 Listen & Download</div>

    <div id="audio-box">
        <audio id="player" controls>
            <source src="horse_audio.mp3" type="audio/mpeg">
        </audio>
        
        <div style="border-top: 1px solid #ddd; margin-top: 15px; padding-top: 5px;">
            <button id="downloadBtn" class="dl-trigger" onclick="startDownload('horse_audio.mp3')">
                📥 Download Audio MP3
            </button>
            <p id="dlStatus" class="status-msg"></p>
        </div>
    </div>

    <script>
        async function startDownload(fileUrl) {
            const btn = document.getElementById('downloadBtn');
            const status = document.getElementById('dlStatus');
            
            try {
                btn.innerText = "⏳ Processing...";
                btn.style.opacity = "0.7";

                const response = await fetch(fileUrl);
                if (!response.ok) throw new Error();

                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = blobUrl;
                // 设置下载后的文件名
                link.download = "Year_of_the_Horse_Audio.mp3";
                document.body.appendChild(link);
                link.click();
                
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
                
                btn.innerText = "📥 Download Audio MP3";
                btn.style.opacity = "1";
                status.innerText = "Download started successfully!";
            } catch (err) {
                // 如果是本地测试或跨域拦截，进入降级方案
                btn.innerText = "📥 Manual Save Required";
                btn.style.background = "#e67e22";
                btn.style.opacity = "1";
                status.innerHTML = "<strong>Local Preview detected.</strong><br>Once uploaded to GitHub, this button will work. For now, please long-press the player and select 'Save audio'.";
            }
        }
    </script>

</body>
</html>
